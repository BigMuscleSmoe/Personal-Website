<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photos — Steven Zhang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="index.html" data-cursor="Home">SZ</a>
    <div class="nav-links">
      <a class="nav-link" href="work.html" data-cursor="Work">Work</a>
      <a class="nav-link" href="experience.html" data-cursor="Experience">Experience</a>
      <a class="nav-link" href="about.html" data-cursor="About">About</a>
      <a class="nav-link" href="photos.html" data-cursor="Photos">Photos</a>
      <a class="nav-link" href="contact.html" data-cursor="Contact">Contact</a>
    </div>
  </nav>

  <!-- Password gate -->
  <div class="pw-gate" id="pw-gate">
    <button class="pw-close" onclick="history.back()" data-cursor="Back" aria-label="Go back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="pw-box">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent2);margin-bottom:20px;">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <div class="pw-title">This page is private</div>
      <div class="pw-sub">Enter the password to view photos</div>
      <form id="pw-form" autocomplete="off">
        <input class="pw-input" id="pw-input" type="password" placeholder="Password" autofocus />
        <button class="pw-btn" type="submit">Unlock</button>
      </form>
      <div class="pw-error" id="pw-error">Incorrect password</div>
    </div>
  </div>

  <main class="page-inner" id="photos-content" style="display:none;">

    <!-- Albums view -->
    <section id="albums-view">
      <section class="lamp-hero">
        <div class="lamp-fx" aria-hidden="true">
          <div class="lamp-cone lamp-cone-l"></div>
          <div class="lamp-cone lamp-cone-r"></div>
          <div class="lamp-glow"></div>
          <div class="lamp-hotspot"></div>
          <div class="lamp-bar"></div>
        </div>
        <h2 class="lamp-title">Photos</h2>
        <span class="lamp-sub" id="album-count"></span>
      </section>
      <div class="album-grid" id="album-grid"></div>
    </section>

    <!-- Viewer view (hidden initially) -->
    <section id="viewer-view" style="display: none;">
      <a class="viewer-back" href="#" id="back-to-albums" data-cursor="Back">
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none" aria-hidden="true">
          <path d="M7 1L1 6.5 7 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Albums
      </a>
      <div class="page-header">
        <h2 class="page-title" id="viewer-title"></h2>
        <span class="page-count" id="viewer-counter"></span>
      </div>
      <div class="viewer-stage">
        <img class="viewer-img" id="viewer-img" alt="" />
      </div>
      <div class="viewer-controls">
        <button class="viewer-arrow" id="viewer-prev" data-cursor="Prev" aria-label="Previous photo">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
            <path d="M8 1L2 8l6 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="viewer-counter" id="viewer-counter-2"></span>
        <button class="viewer-arrow" id="viewer-next" data-cursor="Next" aria-label="Next photo">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
            <path d="M2 1l6 7-6 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <footer class="page-footer">
      <span class="footer-copy">© <span id="year"></span> Steven Zhang</span>
      <a class="footer-copy" href="index.html" data-cursor="Home" style="text-decoration: none;">← Home</a>
    </footer>
  </main>

  <script>
    (function() {
      var PASS = 'LemonLime';
      var gate = document.getElementById('pw-gate');
      var content = document.getElementById('photos-content');
      var form = document.getElementById('pw-form');
      var input = document.getElementById('pw-input');
      var error = document.getElementById('pw-error');

      if (sessionStorage.getItem('photos-unlocked') === '1') {
        gate.style.display = 'none';
        content.style.display = '';
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value === PASS) {
          sessionStorage.setItem('photos-unlocked', '1');
          gate.style.display = 'none';
          content.style.display = '';
        } else {
          error.style.opacity = '1';
          input.value = '';
          input.focus();
        }
      });
    })();
  </script>
  <script src="script.js"></script>
  <script src="photos.js"></script>
</body>
</html>
